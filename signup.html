<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Eye | Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <!-- Navbar Section -->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo"><i class="fa-solid fa-map-location-dot"></i>Campus Eye</a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Home</a>
                </li>
                <li class="navbar__item">
                    <a href="/about.html" class="navbar__links">About</a>
                </li>
                <li class="navbar__item">
                    <a href="/map.html" class="navbar__links">Map</a>
                </li>
                <li class="navbar__btn">
                    <a href="/login.html" class="button">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Sign Up Section -->
    <div class="login">
        <div class="login__container">

            <div class="login__header">
                <h1>Create an Account</h1>
            </div>

            <div class="login__tabs" role="tablist" aria-label="Sign up type">
                <button class="login__tab active" id="tab-student" role="tab" aria-selected="true" aria-controls="panel-student" onclick="switchRole('student')">
                    <i class="fa-solid fa-user-graduate"></i> Student
                </button>
                <button class="login__tab" id="tab-admin" role="tab" aria-selected="false" aria-controls="panel-admin" onclick="switchRole('admin')">
                    <i class="fa-solid fa-user-shield"></i> Admin
                </button>
            </div>

            <!-- Student Sign Up -->
            <div class="login__panel active" id="panel-student" role="tabpanel" aria-labelledby="tab-student">
                <form onsubmit="handleSignup(event, 'student')">
                    <div class="login__group">
                        <label for="student-name">Full Name</label>
                        <input type="text" id="student-name" required>
                    </div>
                    <div class="login__group">
                        <label for="student-id">Student ID</label>
                        <input type="text" id="student-id" placeholder="e.g. STU20231045" required>
                    </div>
                    <div class="login__group">
                        <label for="student-email">College Email</label>
                        <input type="email" id="student-email" placeholder="name@campus.edu" required>
                    </div>
                    <div class="login__group">
                        <label for="student-department">Department</label>
                        <input type="text" id="student-department" placeholder="e.g. Computer Science" required>
                    </div>
                    <div class="login__group">
                        <label for="student-password">Password</label>
                        <input type="password" id="student-password" placeholder="Create a password" required>
                    </div>
                    <div class="login__group">
                        <label for="student-confirm">Confirm Password</label>
                        <input type="password" id="student-confirm" placeholder="Re-enter your password" required>
                    </div>
                    <button type="submit" class="login__btn">Create Student Account</button>
                </form>
            </div>

            <!-- Admin Sign Up -->
            <div class="login__panel" id="panel-admin" role="tabpanel" aria-labelledby="tab-admin">
                <form onsubmit="handleSignup(event, 'admin')">
                    <div class="login__group">
                        <label for="admin-name">Full Name</label>
                        <input type="text" id="admin-name" required>
                    </div>
                    <div class="login__group">
                        <label for="admin-employee-id">Employee ID</label>
                        <input type="text" id="admin-employee-id" placeholder="e.g. EMP4821" required>
                    </div>
                    <div class="login__group">
                        <label for="admin-email">Admin Email</label>
                        <input type="email" id="admin-email" placeholder="admin@campuseye.edu" required>
                    </div>
                    <div class="login__group">
                        <label for="admin-department">Department / Office</label>
                        <input type="text" id="admin-department" placeholder="e.g. Facilities Management" required>
                    </div>
                    <div class="login__group">
                        <label for="admin-code">Admin Access Code</label>
                        <input type="text" id="admin-code" placeholder="Provided by your institution" required>
                    </div>
                    <div class="login__group">
                        <label for="admin-password">Password</label>
                        <input type="password" id="admin-password" placeholder="Create a password" required>
                    </div>
                    <div class="login__group">
                        <label for="admin-confirm">Confirm Password</label>
                        <input type="password" id="admin-confirm" placeholder="Re-enter your password" required>
                    </div>
                    <button type="submit" class="login__btn">Create Admin Account</button>
                </form>
            </div>

            <div class="login__footer">
                Already have an account? <a href="/login.html">Log in</a>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
